services:
  postgres:
    profiles: ["local"]
    image: postgres:15-alpine
    container_name: meet-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-meet_clone}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-meet_clone}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    profiles: ["local"]
    image: redis:7-alpine
    container_name: meet-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_dev_password_change_me}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  server:
    build: ./server
    container_name: meet-server
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - MEDIASOUP_MIN_PORT=${MEDIASOUP_MIN_PORT:-10000}
      - MEDIASOUP_MAX_PORT=${MEDIASOUP_MAX_PORT:-11000}
      - MEDIASOUP_ANNOUNCED_IP=${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"
      - "10000-11000:10000-11000/udp"
      - "10000-11000:10000-11000/tcp"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  #  ai-service:
  #    build: ./ai-service
  #    container_name: meet-ai
  #    volumes:
  #      - ./ai-service:/app
  #    environment:
  #      - DEEPL_API_KEY=${DEEPL_API_KEY}
  #      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
  #    depends_on:
  #      - server

  client:
    build: ./client
    container_name: meet-client
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
