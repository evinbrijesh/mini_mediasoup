services:
  postgres:
    image: postgres:15-alpine
    container_name: meet-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-meet_clone}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis is declared here for potential future use but the server no longer
  # depends on it at runtime (the redis dependency was removed from server/package.json).
  redis:
    image: redis:7-alpine
    container_name: meet-redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: meet-server
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-meet_clone}?schema=public
      # BUG-068: JWT_SECRET must be set or the server crashes on startup
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET env var is required}
      # BUG-070: mediasoup port range – must match the exposed UDP/TCP range below
      - MEDIASOUP_MIN_PORT=10000
      - MEDIASOUP_MAX_PORT=20000
      - ANNOUNCED_IP=${ANNOUNCED_IP:-127.0.0.1}
    ports:
      - "3000:3000"
      # BUG-066: expose the full 10 000-port RTP range that mediasoup is configured to use
      - "10000-20000:10000-20000/udp"
      - "10000-20000:10000-20000/tcp"
    depends_on:
      - postgres

  ai-service:
    build: ./ai-service
    container_name: meet-ai
    volumes:
      - ./ai-service:/app
    environment:
      - DEEPL_API_KEY=${DEEPL_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      # BUG-069: use the Docker service name, not localhost
      - SERVER_URL=http://server:3000
    depends_on:
      - server

  client:
    build: ./client
    container_name: meet-client
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # BUG-067: VITE_API_URL must be reachable from the browser (host machine),
      # not from inside Docker. Use the host's IP / domain in production.
      # For local development this remains localhost; override via .env for prod.
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - server

volumes:
  postgres_data:
