name: Release Checklist

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Version to release (e.g. 1.2.3)"
        required: true
      release_notes:
        description: "High-level release notes summary"
        required: true

jobs:
  release-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.target_version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi

      - name: Ensure changelog has target version heading
        run: |
          VERSION="${{ github.event.inputs.target_version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md missing heading for version $VERSION"
            exit 1
          fi

      - name: Print release checklist
        run: |
          echo "Release checklist for v${{ github.event.inputs.target_version }}"
          echo "- [x] CI green on default branch"
          echo "- [x] Changelog entry exists"
          echo "- [ ] Create release commit"
          echo "- [ ] Create annotated tag: v${{ github.event.inputs.target_version }}"
          echo "- [ ] Create GitHub release with notes"
          echo "Release notes summary:"
          echo "${{ github.event.inputs.release_notes }}"
